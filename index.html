<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Calculator</title>
</head>
<body>
  <h1>Simple Calculator</h1>
  <input type="number" id="num1" placeholder="First number" />
  <input type="number" id="num2" placeholder="Second number" />
  <br><br>
  <button type="button" id="btnSum">+</button>
  <button type="button" id="btnSubtract">-</button>
  <button type="button" id="btnMultiply">×</button>
  <button type="button" id="btnDivide">÷</button>
  <p>Result: <strong id="result">—</strong></p>

  <!-- Link to the compiled JS files -->
  <script src="sum.js"></script>
  <script src="subtract.js"></script>
  <script src="multiply.js"></script>
  <script src="divide.js"></script>
  <script>
    document.getElementById('btnSum').addEventListener('click', function () {
      var a = Number(document.getElementById('num1').value) || 0;
      var b = Number(document.getElementById('num2').value) || 0;
      document.getElementById('result').textContent = sum(a, b);
    });

    document.getElementById('btnSubtract').addEventListener('click', function () {
      var a = Number(document.getElementById('num1').value) || 0;
      var b = Number(document.getElementById('num2').value) || 0;
      document.getElementById('result').textContent = subtract(a, b);
    });

    document.getElementById('btnMultiply').addEventListener('click', function () {
      var a = Number(document.getElementById('num1').value) || 0;
      var b = Number(document.getElementById('num2').value) || 0;
      document.getElementById('result').textContent = multiply(a, b);
    });

    document.getElementById('btnDivide').addEventListener('click', function () {
      var a = Number(document.getElementById('num1').value) || 0;
      var b = Number(document.getElementById('num2').value) || 0;
      document.getElementById('result').textContent = divide(a, b);
    });
  </script>
</body>
</html>
